format:
  eyebrow: "The Format"
  headline: |-
    SIX
    WRITERS,
    TWO
    ROUNDS.
  body: |-
    A "writers round" is a Nashville tradition. The name comes from the way
    the songs travel — the first writer plays a song, then the next writer
    plays one, and so on down the line. When everyone has sung, it loops
    back 'round to the first writer and starts again.

    Each evening we host two rounds. Usually there are six writers in the
    line plus a featured headliner, for seven total. At Christmas it's
    three writers plus the headliner. If a duet joins, the line stretches
    to make room for the extra chair.

    Our rounds bring together Christian songwriters — independent, signed,
    local, on tour — for an evening of new songs, old ones, and the kind
    of quiet conversation that only happens when the lights are down and
    the room is leaning in.
